<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="FGP Cadence">
<title>FGP Cadence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0A0A0F;color:#E0E0F0;font-family:'Courier New',monospace;padding:24px 16px 48px;max-width:420px;margin:0 auto;min-height:100vh}
h1{font-size:20px;letter-spacing:3px;color:#00BFFF;text-transform:uppercase;margin-bottom:4px}
.sub{font-size:10px;color:#4A4A6A;letter-spacing:1px;margin-bottom:24px}
.measure-row{display:flex;justify-content:space-around;margin-bottom:12px}
.m{font-size:12px;font-weight:bold;color:#4A4A6A;letter-spacing:1px;padding-bottom:3px;border-bottom:2px solid transparent}
.m.on{border-bottom-color:currentColor}
#cue{font-size:64px;font-weight:bold;text-align:center;color:#4A4A6A;letter-spacing:4px;min-height:80px;line-height:80px;margin-bottom:8px}
#binfo{text-align:center;font-size:12px;color:#4A4A6A;letter-spacing:2px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:20px}
.cell{height:10px;border-radius:3px;background:#1E1E30}
button{font-family:'Courier New',monospace;cursor:pointer;border:none}
.btn{display:block;width:100%;padding:16px;border-radius:10px;font-size:14px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.btn:active{opacity:.75;transform:scale(.97)}
.blue{background:#00BFFF;color:#000}
.red{background:#FF3D57;color:#fff}
.ghost{background:transparent;border:1px solid #1E1E30;color:#4A4A6A}
hr{border:none;border-top:1px solid #1E1E30;margin:24px 0}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sbox{background:#141420;border:1px solid #1E1E30;border-radius:10px;padding:12px 6px;text-align:center}
.sval{font-size:28px;font-weight:bold;display:block}
.slbl{font-size:9px;color:#4A4A6A;letter-spacing:1px;display:block;margin-top:2px}
.sbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.made{background:rgba(0,230,118,.12);border:1px solid rgba(0,230,118,.4);border-radius:10px;color:#00E676;font-size:13px;font-weight:bold;letter-spacing:1px;padding:20px 10px;cursor:pointer;line-height:1.4;font-family:'Courier New',monospace;width:100%}
.miss{background:rgba(255,61,87,.1);border:1px solid rgba(255,61,87,.3);border-radius:10px;color:#FF3D57;font-size:13px;font-weight:bold;letter-spacing:1px;padding:20px 10px;cursor:pointer;line-height:1.4;font-family:'Courier New',monospace;width:100%}
.made:active,.miss:active{opacity:.7;transform:scale(.96)}
.pbar{height:8px;background:#1E1E30;border-radius:4px;overflow:hidden;margin-bottom:8px}
.pfill{height:100%;background:linear-gradient(90deg,#00BFFF,#00E676);border-radius:4px;width:0%;transition:width .4s}
.rinfo{display:flex;justify-content:space-between;font-size:10px;color:#4A4A6A;letter-spacing:1px;margin-bottom:14px}
.wcard{background:rgba(245,196,0,.04);border:1px solid rgba(245,196,0,.15);border-radius:10px;padding:14px;margin-top:24px}
.wlbl{font-size:9px;color:#F5C400;letter-spacing:2px;margin-bottom:6px}
.wtxt{font-size:13px;color:#4A4A6A;font-style:italic;line-height:1.5}
.wnxt{background:none;border:none;font-size:10px;color:#4A4A6A;letter-spacing:1px;cursor:pointer;font-family:'Courier New',monospace;margin-top:8px;padding:0}
</style>
</head>
<body>

<h1>⚡ FGP Cadence</h1>
<div class="sub">briesath rhythm · 60 bpm · 4/4 · 4 beat prep + 16 beats</div>

<div class="measure-row">
  <div class="m" id="m0">PREP</div>
  <div class="m" id="m1">M1</div>
  <div class="m" id="m2">M2</div>
  <div class="m" id="m3">M3</div>
  <div class="m" id="m4">M4</div>
</div>

<div id="cue">READY</div>
<div id="binfo">60 BPM · TAP START</div>

<div class="grid" id="grid"></div>

<button class="btn blue" id="sbtn" onclick="toggle()">&#9654; START</button>
<button class="btn ghost" id="rbtn" onclick="resetCycles()" style="display:none">&#8635; RESET CYCLES</button>
<div style="text-align:center;font-size:11px;color:#4A4A6A;margin-top:4px;letter-spacing:1px">
  Cycles: <span id="cyc" style="color:#F5C400">0</span>
</div>

<hr>

<div style="font-size:10px;letter-spacing:2px;color:#4A4A6A;text-transform:uppercase;margin-bottom:12px">Shot Counter</div>

<div class="sgrid">
  <div class="sbox"><span class="sval" id="smade" style="color:#00E676">0</span><span class="slbl">MADE</span></div>
  <div class="sbox"><span class="sval" id="satt" style="color:#00BFFF">0</span><span class="slbl">ATTEMPTS</span></div>
  <div class="sbox"><span class="sval" id="spct" style="color:#F5C400">&#8212;</span><span class="slbl">PCT</span></div>
</div>

<div class="pbar"><div class="pfill" id="pfill"></div></div>
<div class="rinfo">
  <div>Current run: <span id="srun" style="color:#00BFFF">0</span></div>
  <div>Best run: <span id="sbest" style="color:#F5C400">0</span></div>
</div>

<div class="sbtns">
  <button class="made" onclick="shot(true)">&#10003; MADE<br><span style="font-size:10px;font-weight:normal;opacity:.7">tap after pocket</span></button>
  <button class="miss" onclick="shot(false)">&#10007; MISS<br><span style="font-size:10px;font-weight:normal;opacity:.7">tap on miss</span></button>
</div>

<button class="btn ghost" onclick="resetShots()">&#8635; RESET SHOT COUNTER</button>

<div class="wcard">
  <div class="wlbl">&#9889; FLASH COACH SAYS</div>
  <div class="wtxt" id="wtxt"></div>
  <button class="wnxt" onclick="nextW()">&#8635; NEXT</button>
</div>

<script>
var BEATS=[
  {m:0,b:1,l:'...',v:null,c:'#2A2A3A'},
  {m:0,b:2,l:'...',v:null,c:'#2A2A3A'},
  {m:0,b:3,l:'...',v:null,c:'#2A2A3A'},
  {m:0,b:4,l:'GO',v:'Go',c:'#4A4A6A'},
  {m:1,b:1,l:'STEP',v:'Step',c:'#00BFFF'},
  {m:1,b:2,l:'SET',v:'Set',c:'#00BFFF'},
  {m:1,b:3,l:'DOWN',v:'Down',c:'#00BFFF'},
  {m:1,b:4,l:'SETTLE',v:null,c:'#4A4A6A'},
  {m:2,b:1,l:'HOLD',v:null,c:'#4A4A6A'},
  {m:2,b:2,l:'HOLD',v:null,c:'#4A4A6A'},
  {m:2,b:3,l:'BACK',v:'Back',c:'#F5C400'},
  {m:2,b:4,l:'FORWARD',v:'Forward',c:'#F5C400'},
  {m:3,b:1,l:'BACK',v:'Back',c:'#F5C400'},
  {m:3,b:2,l:'FORWARD',v:'Forward',c:'#F5C400'},
  {m:3,b:3,l:'BACK',v:'Back',c:'#F5C400'},
  {m:3,b:4,l:'FORWARD',v:'Forward',c:'#F5C400'},
  {m:4,b:1,l:'BACK',v:'Back',c:'#F5C400'},
  {m:4,b:2,l:'BACK',v:'Back',c:'#F5C400'},
  {m:4,b:3,l:'SHOOT',v:'Shoot',c:'#00E676'},
  {m:4,b:4,l:'HOLD',v:null,c:'#4A4A6A'}
];

var W=[
  'Every shot the same. Every time.',
  'The stroke is a pendulum. Elbow pivots. Nothing else moves.',
  'Settle at the cue ball. Do not rush the backswing.',
  'Eyes on the object ball at contact. Every time.',
  'Follow-through is not optional. Finish through the ball.',
  'Speed control is 60% of position play.',
  'Commit before you get down. No second-guessing.',
  'The slow backswing separates pros from amateurs.',
  'One shot at a time. That is all there is.',
  'Hold your finish. Watch the cue ball.',
  'Your Fargo is built one shot at a time.',
  'The comeback nobody saw coming.',
  'Routine is your armor. Wear it every shot.',
  'Plan two balls ahead. Always.'
];

var on=false,idx=0,tmr=null,cyc=0;
var made=0,att=0,run=0,best=0,wi=0;

// Build grid
var g=document.getElementById('grid');
for(var i=0;i<20;i++){var d=document.createElement('div');d.className='cell';d.id='c'+i;g.appendChild(d);}

function toggle(){on?stop():go();}

function go(){
  on=true; idx=0;
  document.getElementById('sbtn').innerHTML='&#9646;&#9646; STOP';
  document.getElementById('sbtn').className='btn red';
  document.getElementById('rbtn').style.display='none';
  // Unlock iOS audio with a silent utterance on the direct tap gesture
  if(window.speechSynthesis){
    window.speechSynthesis.cancel();
    var unlock=new SpeechSynthesisUtterance(' ');
    unlock.volume=0;
    window.speechSynthesis.speak(unlock);
  }
  // Small delay so unlock settles before first real word
  setTimeout(function(){
    fire(0);
    tmr=setInterval(function(){
      idx++;
      if(idx>=20){
        cyc++;
        document.getElementById('cyc').textContent=cyc;
        nextW();
        stop();
        return;
      }
      fire(idx);
    },1000);
  },150);
}

function stop(){
  on=false; clearInterval(tmr);
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  document.getElementById('sbtn').innerHTML='&#9654; START';
  document.getElementById('sbtn').className='btn blue';
  if(cyc>0)document.getElementById('rbtn').style.display='block';
  document.getElementById('cue').textContent='READY';
  document.getElementById('cue').style.color='#4A4A6A';
  document.getElementById('binfo').textContent='60 BPM · TAP START';
  for(var i=0;i<20;i++){var c=document.getElementById('c'+i);c.style.background='#1E1E30';c.style.height='10px';c.style.opacity='1';}
  for(var m=0;m<=4;m++){var e=document.getElementById('m'+m);e.style.color='#4A4A6A';e.classList.remove('on');}
}

function fire(i){
  var b=BEATS[i];
  document.getElementById('cue').textContent=b.l;
  document.getElementById('cue').style.color=b.c;
  document.getElementById('binfo').textContent=b.b+' \xb7 4';
  for(var m=0;m<=4;m++){
    var e=document.getElementById('m'+m);
    if(b.m===m){e.style.color=b.c;e.classList.add('on');}
    else{e.style.color='#4A4A6A';e.classList.remove('on');}
  }
  for(var j=0;j<20;j++){
    var c=document.getElementById('c'+j);
    if(j===i){c.style.background=b.c;c.style.height='18px';c.style.opacity='1';}
    else if(j<i){c.style.background=BEATS[j].c;c.style.height='10px';c.style.opacity='0.2';}
    else{c.style.background='#1E1E30';c.style.height='10px';c.style.opacity='1';}
  }
  if(b.v&&window.speechSynthesis){
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(b.v);
    u.rate=0.9;u.pitch=1.1;u.volume=1;
    window.speechSynthesis.speak(u);
  }
}

function resetCycles(){cyc=0;document.getElementById('cyc').textContent='0';document.getElementById('rbtn').style.display='none';}

function shot(m){
  att++;
  if(m){made++;run++;}else{run=0;}
  if(run>best)best=run;
  document.getElementById('smade').textContent=made;
  document.getElementById('satt').textContent=att;
  var p=att>0?Math.round(made/att*100):0;
  document.getElementById('spct').textContent=att>0?p+'%':'—';
  document.getElementById('pfill').style.width=p+'%';
  document.getElementById('srun').textContent=run;
  document.getElementById('sbest').textContent=best;
}

function resetShots(){made=0;att=0;run=0;best=0;document.getElementById('smade').textContent=0;document.getElementById('satt').textContent=0;document.getElementById('spct').textContent='—';document.getElementById('pfill').style.width='0%';document.getElementById('srun').textContent=0;document.getElementById('sbest').textContent=0;}

function nextW(){var p=wi;while(wi===p)wi=Math.floor(Math.random()*W.length);document.getElementById('wtxt').textContent=W[wi];}

wi=Math.floor(Math.random()*W.length);
document.getElementById('wtxt').textContent=W[wi];
if(window.speechSynthesis){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};}
</script>
</body>
</html>
